services:
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      APP_ENV: local
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://giftbox:giftbox@postgres:5432/giftbox?sslmode=disable
      APP_BASE_URL: http://localhost:8080
      JWT_ISSUER: http://localhost:8080
      JWT_AUDIENCE: giftbox-api
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: giftbox
      POSTGRES_USER: giftbox
      POSTGRES_PASSWORD: giftbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
