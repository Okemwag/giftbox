services:
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      APP_ENV: local
      HTTP_ADDR: :8080
      DATABASE_DSN: postgres://giftbox:giftbox@postgres:5432/giftbox?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: giftbox
      POSTGRES_USER: giftbox
      POSTGRES_PASSWORD: giftbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
